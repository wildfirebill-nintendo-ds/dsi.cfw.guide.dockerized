---
name: Feature Request
about: Suggest a new feature or improvement
title: '[FEATURE] '
labels: 'feature'
assignees: ''

body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the feature
      placeholder: Describe the feature here...
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Solved
      description: What problem does this solve
      placeholder: Describe the problem...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should it work
      placeholder: Describe your proposed solution...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternatives you considered
      placeholder: Describe alternatives...
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context
    validations:
      required: false
---