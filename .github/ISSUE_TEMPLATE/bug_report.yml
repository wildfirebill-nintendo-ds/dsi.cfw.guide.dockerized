---
name: Bug Report
about: Create a report to help us fix an issue
title: '[BUG] '
labels: 'bug'
assignees: ''

body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
      placeholder: Describe the bug here...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the bug (one per line)
      placeholder: |
        1. Step one
        2. Step two
        3. Step three
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen
      placeholder: Describe what should happen...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens
      placeholder: Describe what actually happens...
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      description: Operating system
      placeholder: e.g. Ubuntu 20.04
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Version
      description: Version of the software
      placeholder: e.g. 1.0.0
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Add screenshots if applicable
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem
    validations:
      required: false
---