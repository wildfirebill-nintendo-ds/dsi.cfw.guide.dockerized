name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'bug'
      - 'fix'
      - 'patch'
  - title: '🛠️ Maintenance'
    labels:
      - 'chore'
      - 'dependencies'
  - title: '📚 Documentation'
    labels:
      - 'documentation'
      - 'docs'
  - title: '🔒 Security'
    labels:
      - 'security'
  - title: '🐳 Docker'
    labels:
      - 'docker'

change-template: '- $TITLE (#$NUMBER)'
change-title-escapes: '\<*_&'

autolabeler:
  - label: 'bug'
    title:
      - '/^fix/i'
      - '/^bug/i'
  - label: 'feature'
    title:
      - '/^feat/i'
      - '/^add/i'
  - label: 'documentation'
    title:
      - '/^docs/i'
      - '/^readme/i'
  - label: 'dependencies'
    title:
      - '/^deps/i'
      - '/^bump/i'

template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPO/compare/$PREVIOUS_TAG...$VERSION
