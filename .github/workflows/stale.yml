name: Stale Issues

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 7
          stale-issue-message: 'This issue has been automatically marked as stale because it has not had activity. It will be closed if no further activity occurs.'
          close-issue-message: 'This issue was closed because it has been inactive for 60 days.'
          stale-pr-message: 'This PR has been automatically marked as stale because it has not had activity.'
          close-pr-message: 'This PR was closed because it has been inactive for 60 days.'
          any-of-labels: 'waiting-for-response,needs-info'
          remove-stale-when-updated: true
