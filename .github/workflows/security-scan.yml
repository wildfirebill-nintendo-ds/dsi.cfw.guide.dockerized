name: Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, typescript, python, go, ruby, java, csharp

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  trufflehog:
    name: Secret Scanning
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog-actions@main
        with:
          scan: true
          base: ${{ github.event.repository.default_branch }}

  scorecard:
    name: Scorecard Security Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Scorecard
        uses: ossf/scorecard-action@main
        with:
          results-file: results.sarif
          results-format: SARIF
          publish-results: ${{ github.event_name != 'pull_request' }}

      - name: Upload results to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: ${{ github.event_name != 'pull_request' }}
        with:
          sarif_file: results.sarif
