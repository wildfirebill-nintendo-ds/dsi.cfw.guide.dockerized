name: Greeting

on:
  pull_request:
    types: [opened, reopened]
  issues:
    types: [opened]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          pr-message: 'Thank you for submitting a pull request! We will review it shortly.'
          issue-message: 'Thank you for opening this issue! We will look into it shortly.'
