name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main
      - master
  release:
    types: [published]

env:
  DOCKER_HUB_REPO: ${{ secrets.DOCKER_HUB_REPO }}
  DESCRIPTION: ${{ github.repository.description || 'A Docker image' }}
  SOURCE_URL: https://github.com/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract metadata for Docker Hub
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ env.DOCKER_HUB_REPO }}
          tags: |
            type=ref,event=branch
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=ref,event=pr
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.description=${{ env.DESCRIPTION }}
            org.opencontainers.image.source=${{ env.SOURCE_URL }}
            org.opencontainers.image.url=${{ env.SOURCE_URL }}
          platforms: linux/amd64,linux/arm64
          provenance: false
